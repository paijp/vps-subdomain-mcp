# https://github.com/paijp/vps-subdomain-mcp

# dnf-automatic configuration for the VPS seminar host.
# Applies security updates automatically. Host reboots are handled separately
# by vps-mcp-reboot.timer, so dnf-automatic itself never reboots.

[commands]
upgrade_type = security
random_sleep = 3600
network_online_timeout = 60
download_updates = yes
apply_updates = yes
reboot = never

[emitters]
emit_via = stdio

[base]
debuglevel = 1
