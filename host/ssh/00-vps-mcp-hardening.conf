# https://github.com/paijp/vps-subdomain-mcp
#
# SSH hardening for the VPS host.
#
# Access to the host is key-based (root login is "without-password"), so
# password authentication is disabled entirely. This matters because seminar
# participants hold root inside their own container and the container subnet
# can reach the host's :22 — leaving password auth on would expose every host
# account (e.g. the distro's default "rocky"/"debian" user) to brute force
# from inside the container network.
#
# The 00- prefix sorts this drop-in ahead of the distro's own
# (e.g. 50-redhat.conf); sshd applies the first matching directive, so this
# overrides the default regardless of what later drop-ins set.

PasswordAuthentication no
KbdInteractiveAuthentication no
