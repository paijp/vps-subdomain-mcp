# https://github.com/paijp/vps-subdomain-mcp
#
# fail2ban jail configuration for the VPS host.
#
# This file is installed as /etc/fail2ban/jail.d/00-vps-mcp.conf.
# The 00- prefix sorts it BEFORE the distro-supplied 00-firewalld.conf so
# the banaction override below wins; otherwise fail2ban would try to use
# firewalld which is masked on this host.

[DEFAULT]
# Use the built-in nftables action instead of firewalld.
banaction       = nftables[type=multiport]
banaction_allports = nftables[type=allports]

# Ban for 1 hour on 5 failures within 10 minutes.
# Password auth is disabled, so hits are mostly invalid-user / key-auth
# probes; 5/10 min is strict enough without locking out accidental fat-fingers.
bantime  = 1h
findtime = 10m
maxretry = 5

[sshd]
enabled = true
