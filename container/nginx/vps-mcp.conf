# https://github.com/paijp/vps-subdomain-mcp

# vps-mcp nginx configuration
# server_name is replaced by vps-mcp-init.sh (run via podman exec on first boot).
# Certificate paths are initially self-signed; vps-mcp-init.sh replaces them
# after certbot certonly --webroot succeeds. certbot.timer handles renewal.

# HTTP: serve ACME challenges; forward everything else to HTTPS.
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: accept PROXY protocol from the SNI passthrough proxy (10.89.0.1),
# and direct TLS connections from localhost (certbot, health checks).
server {
    listen 443 ssl proxy_protocol;
    listen 127.0.0.1:443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Trust PROXY protocol headers only from the gateway.
    set_real_ip_from 10.89.0.1;
    real_ip_header   proxy_protocol;

    # Redirect requests whose Host header doesn't match this container's subdomain.
    # Handles fallback-routed requests when default-web serves unknown hosts.
    if ($host != $server_name) {
        return 301 https://$server_name$request_uri;
    }

    # ── OAuth discovery (no auth required) ───────────────────────────────────
    location = /.well-known/oauth-authorization-server {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── /mcp/authorize: OAuth authorization endpoint ─────────────────────────
    # Accessed by the learner's browser (not Anthropic backend),
    # so no IP restriction.
    location /mcp/authorize {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── /mcp/register: dynamic client registration (RFC 7591) ────────────────
    # Called by Claude.ai before the flow; no IP restriction.
    location /mcp/register {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── OAuth-container endpoints (GitHub login broker) ──────────────────────
    # Active only on the oauth.<DOMAIN> container; harmless elsewhere (the app
    # only registers these routes when GitHub credentials are present).
    # /mcp/start and /mcp/callback are browser-facing (no IP restriction).
    # /mcp/resolve is self-authenticating via the PKCE verifier, so it needs no
    # IP restriction either.
    location /mcp/start {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /mcp/callback {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /mcp/resolve {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── /mcp/token: MCP OAuth token endpoint ─────────────────────────────────
    # The real gate is now PKCE + GitHub email match (resolved via the oauth
    # container); the Anthropic IP allow-list is kept only as defense in depth.
    location /mcp/token {
        allow 160.79.104.0/21;
        deny  all;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── /mcp/sse and /mcp/messages: MCP SSE transport ────────────────────────
    location /mcp/sse {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    location /mcp/messages {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Default: serve /var/www/html ─────────────────────────────────────────
    location / {
        root  /var/www/html;
        index index.html index.htm;
    }
}
