# vps-mcp nginx configuration
# server_name is replaced by vps-mcp-init.sh (run via podman exec on first boot).
# Certificate paths are initially self-signed; vps-mcp-init.sh replaces them
# after certbot certonly --webroot succeeds. certbot.timer handles renewal.

# HTTP: serve ACME challenges; forward everything else to HTTPS.
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: accept PROXY protocol from the SNI passthrough proxy (10.89.0.1),
# and direct TLS connections from localhost (certbot, health checks).
server {
    listen 443 ssl proxy_protocol;
    listen 127.0.0.1:443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Trust PROXY protocol headers only from the gateway.
    set_real_ip_from 10.89.0.1;
    real_ip_header   proxy_protocol;

    # Redirect requests whose Host header doesn't match this container's subdomain.
    # Handles fallback-routed requests when default-web serves unknown hosts.
    if ($host != $server_name) {
        return 301 https://$server_name$request_uri;
    }

    # ── OAuth discovery (no auth required) ───────────────────────────────────
    location = /.well-known/oauth-authorization-server {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── /authorize: OAuth authorization endpoint ─────────────────────────────
    # Accessed by the learner's browser (not Anthropic backend),
    # so no IP restriction.
    location /authorize {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── /token: MCP OAuth token endpoint ─────────────────────────────────────
    # Restricted to Anthropic's IP range so only Claude.ai can obtain tokens.
    location /token {
        allow 160.79.104.0/21;
        deny  all;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── /sse and /messages: MCP SSE transport ────────────────────────────────
    location /sse {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    location /messages {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Default: serve /var/www/html ─────────────────────────────────────────
    location / {
        root  /var/www/html;
        index index.html index.htm;
    }
}
